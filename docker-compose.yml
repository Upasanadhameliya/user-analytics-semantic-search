version: "3.9"

services:
db:
image: postgres:15
container_name: analytics_db
restart: always

```
environment:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: password
  POSTGRES_DB: analytics

ports:
  - "5432:5432"

volumes:
  - postgres_data:/var/lib/postgresql/data

healthcheck:
  test: ["CMD-SHELL", "pg_isready -U admin"]
  interval: 10s
  timeout: 5s
  retries: 5
```

volumes:
postgres_data:
